name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    name: Unit Tests (macOS ARM / Python ${{ matrix.python-version }})
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          python -c "import mlx.core as mx; print('MLX:', mx.__version__, '| device:', mx.default_device())"
          python -c "import mlx_lm; print('mlx-lm:', mlx_lm.__version__)"

      - name: Verify imports
        run: |
          python -c "from mlx_flash import FlashConfig, FlashManager; print('imports OK')"

      - name: Run test suite
        run: pytest tests/ -q --tb=short
